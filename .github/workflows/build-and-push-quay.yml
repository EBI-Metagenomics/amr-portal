name: Build and Publish Images to Quay

on:
  workflow_dispatch:


env:
  QUAY_ORG: microbiome-informatics
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build-and-push-backend:
    name: Build and push backend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        env:
          DOCKER_CONFIG_JSON: ${{ secrets.QUAY_DOCKER_CONFIG }}
        run: |
          mkdir -p ~/.docker
          echo "$DOCKER_CONFIG_JSON" > ~/.docker/config.json

      - name: Build backend Docker image
        run: |
          docker build \
            -t quay.io/${{ env.QUAY_ORG }}/amr-portal-backend:${{ env.IMAGE_TAG }} \
            -f backend/Dockerfile \
            backend/

      - name: Push backend Docker image
        run: |
          docker push quay.io/${{ env.QUAY_ORG }}/amr-portal-backend:${{ env.IMAGE_TAG }}

  build-and-push-frontend:
    name: Build and push frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Quay.io
        env:
          DOCKER_CONFIG_JSON: ${{ secrets.QUAY_DOCKER_CONFIG }}
        run: |
          mkdir -p ~/.docker
          echo "$DOCKER_CONFIG_JSON" > ~/.docker/config.json

      - name: Build frontend Docker image
        run: |
          docker build \
            -t quay.io/${{ env.QUAY_ORG }}/amr-portal-frontend:${{ env.IMAGE_TAG }} \
            -f frontend/Dockerfile \
            .

      - name: Push frontend Docker image
        run: |
          docker push quay.io/${{ env.QUAY_ORG }}/amr-portal-frontend:${{ env.IMAGE_TAG }}
