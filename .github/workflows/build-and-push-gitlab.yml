name: Build and Publish Images to EBI Registry

on:
  workflow_dispatch:


env:
  REGISTRY: dockerhub.ebi.ac.uk
  IMAGE_NAMESPACE: microbiome-informatics/containers
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  build-and-push-backend:
    permissions:
      contents: read
    name: Build and push backend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to EBI GitLab registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_CONTAINERS_USERNAME }}
          password: ${{ secrets.GITLAB_CONTAINERS_PASSWORD }}

      - name: Build backend Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amr-portal-backend:${{ env.IMAGE_TAG }} \
            -f backend/Dockerfile \
            backend/

      - name: Push backend Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amr-portal-backend:${{ env.IMAGE_TAG }}

  build-and-push-frontend:
    permissions:
      contents: read
    name: Build and push frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to EBI GitLab registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GITLAB_CONTAINERS_USERNAME }}
          password: ${{ secrets.GITLAB_CONTAINERS_PASSWORD }}

      - name: Build frontend Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amr-portal-frontend:${{ env.IMAGE_TAG }} \
            -f frontend/Dockerfile \
            .

      - name: Push frontend Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/amr-portal-frontend:${{ env.IMAGE_TAG }}
