# Build and publish images to this project's GitLab container registry.
# Auth: CI_REGISTRY, CI_REGISTRY_USER, CI_JOB_TOKEN
#
# Example tags (project microbiome-informatics/amr-portal, branch orig_0.9f):
#   dockerhub.ebi.ac.uk/microbiome-informatics/amr-portal/amr-portal-backend:orig_0.9f
#   dockerhub.ebi.ac.uk/microbiome-informatics/amr-portal/amr-portal-frontend:orig_0.9f

stages:
  - build

variables:
  BACKEND_DOCKERFILE: backend/Dockerfile
  BACKEND_CONTEXT: backend
  FRONTEND_DOCKERFILE: frontend/Dockerfile
  FRONTEND_CONTEXT: .

.build-image-rules: &build-image-rules
  rules:
    - when: manual

.docker-build:
  before_script:
    - export IMAGE_TAG="$(printf '%s' "${CI_COMMIT_REF_NAME}" | tr -d '[:space:]')"
    - export BACKEND_IMAGE="${CI_REGISTRY_IMAGE}/amr-portal-backend:${IMAGE_TAG}"
    - export FRONTEND_IMAGE="${CI_REGISTRY_IMAGE}/amr-portal-frontend:${IMAGE_TAG}"
    - echo "${CI_JOB_TOKEN}" | docker login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" --password-stdin
  after_script:
    - docker logout "${CI_REGISTRY}" || true

build-and-push-backend:
  extends: .docker-build
  stage: build
  <<: *build-image-rules
  script:
    - echo "Building ${BACKEND_IMAGE}"
    - docker build -t "${BACKEND_IMAGE}" -f "${BACKEND_DOCKERFILE}" "${BACKEND_CONTEXT}"
    - docker push "${BACKEND_IMAGE}"
    - docker rmi "${BACKEND_IMAGE}" || true

build-and-push-frontend:
  extends: .docker-build
  stage: build
  <<: *build-image-rules
  script:
    - echo "Building ${FRONTEND_IMAGE}"
    - docker build -t "${FRONTEND_IMAGE}" -f "${FRONTEND_DOCKERFILE}" "${FRONTEND_CONTEXT}"
    - docker push "${FRONTEND_IMAGE}"
    - docker rmi "${FRONTEND_IMAGE}" || true
