# Build and publish container images to EBI GitLab registry
# Equivalent to .github/workflows/build-and-push-gitlab.yml

stages:
  - build

variables:
  DOCKER_TLS_CERTDIR: ""
  IMAGE_NAMESPACE: microbiome-informatics/containers
  IMAGE_TAG: ${CI_COMMIT_REF_NAME}
  BACKEND_IMAGE: $CI_REGISTRY/${IMAGE_NAMESPACE}/amr-portal-backend:${IMAGE_TAG}
  FRONTEND_IMAGE: $CI_REGISTRY/${IMAGE_NAMESPACE}/amr-portal-frontend:${IMAGE_TAG}

.build-image-rules: &build-image-rules
  rules:
    - when: manual

.ebi-registry-login:
  before_script:
    - docker login $CI_REGISTRY -u $CI_REGISTRY_USER -p $CI_JOB_TOKEN

# CI/CD variables required: GITLAB_CONTAINERS_USERNAME, GITLAB_CONTAINERS_PASSWORD

build-and-push-backend:
  extends: .ebi-registry-login
  stage: build
  <<: *build-image-rules
  image: docker
  script:
    - docker build -t "${BACKEND_IMAGE}" -f backend/Dockerfile backend/
    - docker push "${BACKEND_IMAGE}"
    - docker rmi "${BACKEND_IMAGE}" || true
    - docker logout "$CI_REGISTRY"

build-and-push-frontend:
  extends: .ebi-registry-login
  stage: build
  <<: *build-image-rules
  image: docker
  script:
    - docker build -t "${FRONTEND_IMAGE}" -f frontend/Dockerfile .
    - docker push "${FRONTEND_IMAGE}"
    - docker rmi "${FRONTEND_IMAGE}" || true
    - docker logout "$CI_REGISTRY"
