# Build and publish container images to the project GitLab container registry.
# Auth: CI_REGISTRY, CI_REGISTRY_USER, CI_JOB_TOKEN (built-in, no custom variables).
# Requires a runner with access to the Docker daemon.

stages:
  - build

variables:
  IMAGE_TAG: ${CI_COMMIT_REF_NAME}
  BACKEND_IMAGE: ${CI_REGISTRY_IMAGE}/amr-portal-backend:${IMAGE_TAG}
  FRONTEND_IMAGE: ${CI_REGISTRY_IMAGE}/amr-portal-frontend:${IMAGE_TAG}

.build-image-rules: &build-image-rules
  rules:
    - when: manual

.docker-build:
  before_script:
    - echo "${CI_JOB_TOKEN}" | docker login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" --password-stdin
  after_script:
    - docker logout "${CI_REGISTRY}" || true

build-and-push-backend:
  extends: .docker-build
  stage: build
  <<: *build-image-rules
  script:
    - docker build -t "${BACKEND_IMAGE}" -f backend/Dockerfile backend/
    - docker push "${BACKEND_IMAGE}"
    - docker rmi "${BACKEND_IMAGE}" || true

build-and-push-frontend:
  extends: .docker-build
  stage: build
  <<: *build-image-rules
  script:
    - docker build -t "${FRONTEND_IMAGE}" -f frontend/Dockerfile .
    - docker push "${FRONTEND_IMAGE}"
    - docker rmi "${FRONTEND_IMAGE}" || true
