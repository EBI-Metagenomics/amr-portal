apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    # Strip /amr/data prefix; pod nginx serves the SPA under /data/ (see portal-app/nginx-conf).
    nginx.ingress.kubernetes.io/rewrite-target: /data/$2
  name: amr-api-ingress-fe-react
spec:
  ingressClassName: nginx
  rules:
  - host: www.ebi.ac.uk
    http:
      paths:
      - backend:
          service:
            name: amr-frontend-react-svc
            port:
              number: 8000
        # Same public path as the merged image (portal-static + portal-app). Do not apply both
        # this ingress and amr-api-ingress-fe on the same host unless both backends are equivalent.
        path: /amr/data(/|$)(.*)
        pathType: Prefix
