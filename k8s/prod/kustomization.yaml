apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- backend
- frontend
configMapGenerator:
- name: shared-image-config
  envs:
  - images.env
generatorOptions:
  disableNameSuffixHash: true
replacements:
- source:
    kind: ConfigMap
    name: shared-image-config
    fieldPath: data.BACKEND_IMAGE
  targets:
  - select:
      kind: Deployment
      name: amr-api-prod
    fieldPaths:
    - spec.template.spec.containers.0.image
- source:
    kind: ConfigMap
    name: shared-image-config
    fieldPath: data.FRONTEND_IMAGE
  targets:
  - select:
      kind: Deployment
      name: amr-portal-prod
    fieldPaths:
    - spec.template.spec.containers.0.image
