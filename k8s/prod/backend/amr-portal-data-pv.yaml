apiVersion: v1
kind: PersistentVolume
metadata:
  name: amr-portal-data-pv-prod
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - nfsvers=3
  nfs:
    server: hh-isi-srv-vlan1496.ebi.ac.uk
    path: /ifs/public/rw/metagenomics/amr-dataportal/data/prod

