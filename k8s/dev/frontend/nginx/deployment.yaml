apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: amr-portal-nginx
  name: amr-portal-dev
  namespace: amr-portal-ns-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      ensembl.platform.app.name: amr-portal-dev
  template:
    metadata:
      labels:
        ensembl.platform.app.name: amr-portal-dev
    spec:
      imagePullSecrets:
        - name: containers-pull-secret
      containers:
      - image: DOCKER_IMAGE
        imagePullPolicy: Always
        name: amr-portal-dev
        env:
        - name: VITE_API_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: amr-frontend-configmap-dev
              key: VITE_API_BASE_URL
        - name: VITE_GENOME_FASTA_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: amr-frontend-configmap-dev
              key: VITE_GENOME_FASTA_BASE_URL
        - name: VITE_GENOME_GFF_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: amr-frontend-configmap-dev
              key: VITE_GENOME_GFF_BASE_URL
        - name: VITE_ENABLE_GENOME_VIEWER
          valueFrom:
            configMapKeyRef:
              name: amr-frontend-configmap-dev
              key: VITE_ENABLE_GENOME_VIEWER
        ports:
        - containerPort: 8000
          protocol: TCP