apiVersion: batch/v1
kind: Job
metadata:
  name: amr-asset-copy-dev
  namespace: amr-portal-ns-dev
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  template:
    spec:
      imagePullSecrets:
        - name: ensemblweb-pull-secret
      containers:
      - name: amr-assets-copy
        image: dockerhub.ebi.ac.uk/ensembl-web/deploy-tools:1.0.1
        tty: true
        command: ["/bin/sh", "-ec"]
        args:
          - |
            : "${PROJECT_ID:?PROJECT_ID is required}"
            : "${JOB_ID:?JOB_ID is required}"
            exec /usr/bin/download_artifacts.sh "$PROJECT_ID" "$JOB_ID" "/usr/assets/downloads" "/usr/assets/dist" "frontend/dist"
        imagePullPolicy: Always
        envFrom:
          - configMapRef:
              name: proxy-configmap-dev
          - secretRef:
              name: amr-artifact-download-token
        volumeMounts:
          - mountPath: "/usr/assets"
            name: static-asset-storage
      restartPolicy: Never
      volumes:
        - name: static-asset-storage
          persistentVolumeClaim:
            claimName: amr-portal-assets-pvc-dev