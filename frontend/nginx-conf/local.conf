include /etc/nginx/conf.d/mime.types;

gzip on;
gzip_static on;
gzip_http_version 1.0;
gzip_types application/json text/plain text/css application/x-javascript text/xml application/xml application/xml+rss text/javascript image/x-icon image/bmp application/javascript;

server {
    listen 8000;
    server_name localhost;
    absolute_redirect off;
    port_in_redirect off;
    # Merged static tree: Eleventy at /, React under /data/.
    # In deployed environments ingress strips /amr; locally we emulate this prefix.
    root /usr/share/nginx/html;

    location ^~ /data/ {
        index index.html;
        try_files $uri $uri/ /data/index.html;
    }

    location ^~ /amr/data/ {
        rewrite ^/amr/data/(.*)$ /data/$1 break;
        index index.html;
        try_files $uri $uri/ /data/index.html;
    }

    location ^~ /amr/ {
        rewrite ^/amr/(.*)$ /$1 break;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    location / {
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=1800, stale-while-revalidate=86400";
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
